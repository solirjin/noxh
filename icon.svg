<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Background -->
  <rect width="512" height="512" rx="112" fill="#0d1117"/>

  <!-- House body + roof as one unified amber shape -->
  <!-- Roof: peak (256,68), eaves at (68,262) and (444,262) -->
  <!-- Walls: down to y=456 -->
