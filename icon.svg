<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <!-- Front wall: warmest, most lit (faces viewer) -->
    <linearGradient id="gFW" x1="1" y1="0" x2="0" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#FFFBEB"/>
      <stop offset="100%" stop-color="#FDE68A"/>
    </linearGradient>
    <!-- Right wall: side-lit, medium -->
    <linearGradient id="gRW" x1="1" y1="0" x2="0" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#FDE68A"/>
      <stop offset="100%" stop-color="#F59E0B"/>
    </linearGradient>
    <!-- Front roof slope: top surface, bright amber -->
    <linearGradient id="gRF" x1="0.2" y1="0" x2="0.8" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#FCD34D"/>
      <stop offset="100%" stop-color="#F59E0B"/>
    </linearGradient>
    <!-- Right gable end: least lit, darkest -->
    <linearGradient id="gGE" x1="0" y1="0" x2="1" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#D97706"/>
      <stop offset="100%" stop-color="#92400E"/>
    </linearGradient>
    <!-- Door: emerald green accent -->
    <linearGradient id="gDr" x1="0.5" y1="0" x2="0.5" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#6EE7B7"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
  </defs>

  <!-- Ground shadow -->
  <ellipse cx="295" cy="408" rx="150" ry="20" fill="#000" opacity="0.10"/>

  <!-- Front wall (z=0 face) -->
  <polygon points="230,395 381,308 381,180 230,267" fill="url(#gFW)"/>

  <!-- Right side wall (x=3 face) -->
  <polygon points="381,308 312,268 312,140 381,180" fill="url(#gRW)"/>

  <!-- Right gable — triangular roof end (x=3, least lit) -->
  <polygon points="381,180 312,140 346,64" fill="url(#gGE)"/>

  <!-- Front roof slope (top surface, best lit) -->
  <polygon points="230,267 381,180 346,64 195,151" fill="url(#gRF)"/>

  <!-- Door — green accent, centered on front wall -->
  <polygon points="295,357 340,331 340,277 295,303" fill="url(#gDr)"/>
</svg>
